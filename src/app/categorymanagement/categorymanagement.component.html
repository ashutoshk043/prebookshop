<div class="d-flex flex-column flex-md-row">
  <app-sidebar #sidebar></app-sidebar>

  <div class="main-content flex-grow-1" [class.sidebar-collapsed]="sidebar?.isCollapsed">
    <app-header></app-header>
    <div class="container-fluid mt-4">

      <!-- TOP BAR -->
      <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-4">
        <div class="search-container flex-grow-1">
          <div class="search-input-wrapper">
            <i class="bi bi-search search-icon"></i>
            <input type="text" class="form-control search-input" placeholder="Search category..."
              [(ngModel)]="searchQuery" (input)="onSearch()" />
          </div>
        </div>
        <button *ngIf="searchQuery" class="btn btn-outline-secondary" (click)="clearSearch()">
          <i class="bi bi-x-circle me-1"></i> Clear
        </button>
        <button class="btn btn-primary px-4" (click)="openCategoryForm('add')">
          <i class="bi bi-plus-lg me-2"></i> Add Category
        </button>
      </div>

      <!-- LOADING -->
      <div class="loading-overlay-full" *ngIf="isLoading">
        <div class="spinner-border text-primary"></div>
      </div>

      <!-- CARD GRID -->
      <div class="category-grid" *ngIf="!isLoading">

        <!-- EMPTY STATE -->
        <div class="empty-state" *ngIf="categories.length === 0">
          <i class="bi bi-folder2-open empty-icon"></i>
          <p class="mt-3 text-muted">No categories found</p>
        </div>

        <!-- CATEGORY CARD -->
        <div class="category-card" *ngFor="let category of categories; let i = index; trackBy: trackById">

          <!-- FULL-BLEED COVER IMAGE -->
          <div class="cat-cover">
            <span class="cat-index">{{ (currentPage - 1) * pageSize + i + 1 }}</span>
            <img
              [placeholder]="'assets/logo/logo.png'"
              [appLazyImage]="category.imageUrl"
              [src]="category.imageUrl"
              alt="{{ category.name }}"
              class="cat-img" />
          </div>

          <!-- CARD BODY -->
          <div class="card-body-area">
            <div class="cat-name">{{ category.name }}</div>
            <div class="cat-slug"><i class="bi bi-link-45deg"></i> {{ category.slug }}</div>
          </div>

          <!-- CARD FOOTER -->
          <div class="card-footer-area">
            <div class="footer-row">
              <span class="footer-label"><i class="bi bi-sort-numeric-down me-1"></i>Order</span>
              <span class="footer-value">{{ category.order }}</span>
            </div>
            <div class="footer-row">
              <span class="footer-label"><i class="bi bi-toggle-on me-1"></i>Status</span>
              <span class="status-badge" [ngClass]="category.isActive ? 'badge-active' : 'badge-inactive'">
                {{ category.isActive ? 'Active' : 'Inactive' }}
              </span>
            </div>
            <div class="footer-row">
              <span class="footer-label"><i class="bi bi-globe me-1"></i>Online</span>
              <span class="status-badge" [ngClass]="category.isOnlineVisible ? 'badge-visible' : 'badge-hidden'">
                {{ category.isOnlineVisible ? 'Visible' : 'Hidden' }}
              </span>
            </div>
            <div class="card-actions">
              <button class="btn-action btn-edit" (click)="openCategoryForm('edit', category)">
                <i class="bi bi-pencil-fill"></i> Edit
              </button>
              <button class="btn-action btn-delete" (click)="deleteCategory(category._id)">
                <i class="bi bi-trash-fill"></i> Delete
              </button>
            </div>
          </div>

        </div>
      </div>

      <!-- PAGINATION -->
      <div class="d-flex justify-content-between align-items-center mt-4"
        *ngIf="!isLoading && totalPages > 1">
        <span class="text-muted small">Page {{ currentPage }} of {{ totalPages }}</span>
        <ul class="pagination mb-0">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <button class="page-link" (click)="changePage(currentPage - 1)">‹</button>
          </li>
          <li class="page-item"
            *ngFor="let page of [].constructor(totalPages); let i = index"
            [class.active]="currentPage === i + 1">
            <button class="page-link" (click)="changePage(i + 1)">{{ i + 1 }}</button>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <button class="page-link" (click)="changePage(currentPage + 1)">›</button>
          </li>
        </ul>
      </div>

    </div>
  </div>
</div>

<app-category-form *ngIf="showForm" (close)="closeCategoryForm()"></app-category-form>
