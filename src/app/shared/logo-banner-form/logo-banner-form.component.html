<form [formGroup]="form" (ngSubmit)="submit()" class="img-form">

  <div class="form-body">

    <!-- Name + Type -->
    <div class="form-row two-col">

      <div class="field-group grow">
        <label class="field-label">Image Name <span class="req">*</span></label>
        <input
          class="field-input"
          [class.is-error]="form.get('imageName')?.invalid && form.get('imageName')?.touched"
          placeholder="e.g. Company Logo Dark"
          formControlName="imageName">
        <span class="field-error"
          *ngIf="form.get('imageName')?.invalid && form.get('imageName')?.touched">
          Name is required
        </span>
      </div>

      <div class="field-group">
        <label class="field-label">Type <span class="req">*</span></label>
        <div class="select-wrap">
          <select
            class="field-input field-select"
            [class.is-error]="form.get('imageType')?.invalid && form.get('imageType')?.touched"
            formControlName="imageType">
            <option value="">Select type</option>
            <option value="logo">Logo</option>
            <option value="banner">Banner</option>
          </select>
          <span class="select-caret">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </div>
        <span class="field-error"
          *ngIf="form.get('imageType')?.invalid && form.get('imageType')?.touched">
          Select a type
        </span>
      </div>

    </div>

    <!-- FILE UPLOAD ZONE -->
    <div class="field-group">
      <label class="field-label">Image File <span class="req">*</span></label>

      <!-- State A: no image selected yet -->
      <div
        *ngIf="!previewUrl"
        class="upload-zone"
        [class.drag-over]="isDragOver"
        [class.is-error]="form.get('imageUrl')?.invalid && form.get('imageUrl')?.touched"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
        (click)="fileInput.click()">

        <input
          #fileInput
          type="file"
          accept="image/*"
          class="hidden-input"
          (change)="onFileSelected($event)">

        <div class="upload-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>

        <p class="upload-text">
          <span class="upload-link">Browse</span> or drag &amp; drop your image
        </p>
        <p class="upload-hint">JPG, PNG, GIF, WebP, SVG — max 100 kb</p>
      </div>

      <!-- State B: image selected — show preview -->
      <div *ngIf="previewUrl" class="preview-box">

        <img [src]="previewUrl" [alt]="selectedFileName || 'Preview'" class="preview-img">

        <div class="preview-meta">
          <span class="preview-filename">{{ selectedFileName }}</span>
          <div class="preview-actions">
            <button type="button" class="preview-change" (click)="fileInput2.click()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/>
              </svg>
              Change
            </button>
            <button type="button" class="preview-remove" (click)="removeImage()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
              </svg>
              Remove
            </button>
          </div>
        </div>

        <input #fileInput2 type="file" accept="image/*"
          class="hidden-input" (change)="onFileChange($event)" />
      </div>

      <span class="field-error"
        *ngIf="form.get('imageUrl')?.invalid && form.get('imageUrl')?.touched">
        Please upload an image
      </span>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="form-footer">
    <button type="button" class="btn-reset" (click)="form.reset(); removeImage()">Reset</button>
    <button type="submit" class="btn-save" [disabled]="form.invalid">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ form.get('id')?.value ? 'Update Image' : 'Save Image' }}
    </button>
  </div>

</form>
