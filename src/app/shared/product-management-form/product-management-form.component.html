<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content shadow">

      <!-- HEADER -->
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-semibold">
          {{ formMode === 'add' ? 'Add New Product' : 'Edit Product' }}
        </h5>

        <button
          type="button"
          class="btn-close"
          (click)="closeModal()">
        </button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <form [formGroup]="productForm" (ngSubmit)="submit()">

          <div class="row g-3">

            <!-- PRODUCT NAME -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Product Name *</label>

              <input
                type="text"
                class="form-control"
                placeholder="Enter product name"
                formControlName="name"
                (input)="updateSlug($event)"
              >
            </div>

            <!-- SLUG -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Slug</label>

              <input
                type="text"
                class="form-control"
                formControlName="slug"
                readonly
              >
            </div>

            <!-- CATEGORY -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category *</label>

              <select class="form-select" formControlName="categoryId">
                <option value="">Select Category</option>

                <option
                  *ngFor="let category of categories; trackBy: trackById"
                  [value]="category._id">
                  {{ category.name }}
                </option>
              </select>
            </div>

            <!-- IMAGE URL -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Image URL</label>

              <input
                type="text"
                class="form-control"
                placeholder="Paste image URL"
                formControlName="imageUrl"
              >
            </div>

            <!-- IMAGE PREVIEW -->
            <div
              class="col-12"
              *ngIf="previewImage">

              <label class="form-label fw-semibold">Preview</label>

              <div class="border rounded p-2 text-center bg-light">

                <img
                  [src]="previewImage"
                  class="img-fluid rounded"
                  style="max-height:150px"
                >

              </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="col-12">
              <label class="form-label fw-semibold">Description</label>

              <textarea
                class="form-control"
                rows="3"
                placeholder="Write product description..."
                formControlName="description">
              </textarea>
            </div>

            <!-- TAGS -->
            <div class="col-12">

              <label class="form-label fw-semibold">Tags</label>

              <div class="row">

                <div
                  class="col-md-4"
                  *ngFor="let tagOption of tagOptions">

                  <div class="form-check">

                    <input
                      type="checkbox"
                      class="form-check-input"
                      [checked]="productForm.get('tags')?.value?.includes(tagOption.id)"
                      (change)="toggleTag(tagOption.id, $event)"
                    >

                    <label class="form-check-label">
                      {{ tagOption.name }}
                    </label>

                  </div>

                </div>

              </div>
            </div>

            <!-- FLAGS -->
            <div class="col-12">

              <label class="form-label fw-semibold mb-2">Product Settings</label>

              <div class="row">

                <div class="col-md-4">
                  <div class="form-check form-switch">

                    <input
                      class="form-check-input"
                      type="checkbox"
                      formControlName="isVeg"
                    >

                    <label class="form-check-label">
                      Vegetarian
                    </label>

                  </div>
                </div>

                <div class="col-md-4">
                  <div class="form-check form-switch">

                    <input
                      class="form-check-input"
                      type="checkbox"
                      formControlName="isActive"
                    >

                    <label class="form-check-label">
                      Active
                    </label>

                  </div>
                </div>

                <div class="col-md-4">
                  <div class="form-check form-switch">

                    <input
                      class="form-check-input"
                      type="checkbox"
                      formControlName="isOnlineVisible"
                    >

                    <label class="form-check-label">
                      Online Visible
                    </label>

                  </div>
                </div>

              </div>

            </div>

          </div>

        </form>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="closeModal()">
          Cancel
        </button>

        <button
          type="submit"
          class="btn btn-primary px-4"
          (click)="submit()"
          [disabled]="productForm.invalid">

          {{ formMode === 'add' ? 'Add Product' : 'Update Product' }}

        </button>

      </div>

    </div>
  </div>
</div>
