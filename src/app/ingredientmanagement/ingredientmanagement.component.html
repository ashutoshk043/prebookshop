<div class="d-flex flex-column flex-md-row">
  <app-sidebar #sidebar></app-sidebar>

  <div class="main-content flex-grow-1" [class.sidebar-collapsed]="sidebar?.isCollapsed">
    <app-header></app-header>

    <div class="container-fluid mt-4">

      <!-- Top Bar -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 fw-semibold">Ingredient Management</h5>
        <button class="btn btn-primary" (click)="openIngredientForm('add')">
          <i class="bi bi-plus-lg"></i> Add Ingredient
        </button>
      </div>

      <!-- ✅ Search Bar -->
      <div class="mb-3">
        <div class="input-group w-100">
          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input type="text" class="form-control border-start-0 ps-0" placeholder="Search ingredient..."
            [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange($event)" />
          <!-- ✅ Clear button -->
          <button *ngIf="searchTerm" class="btn btn-outline-secondary" type="button"
            (click)="searchTerm = ''; onSearchChange('')">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>

      <!-- Card -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">

<!-- Loading State -->
<div *ngIf="isLoading" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-2 text-muted">Loading ingredients...</p>
</div>

<!-- Ingredient Card Grid -->
<div class="ingredient-grid" *ngIf="!isLoading">

  <!-- Empty State -->
  <div class="ingr-empty" *ngIf="ingredients.length === 0">
    <i class="bi bi-inbox ingr-empty-icon"></i>
    <p class="mt-2 text-muted">No ingredients found.</p>
  </div>

  <!-- Card -->
  <div class="ingr-card" *ngFor="let item of ingredients; let i = index">
    <div class="ingr-card-top">
      <div class="ingr-icon">
        <i class="bi bi-basket2-fill"></i>
      </div>
      <span class="ingr-serial">#{{ getSerial(i) }}</span>
    </div>
    <div class="ingr-card-body">
      <div class="ingr-name">{{ item.name }}</div>
      <span class="ingr-unit-badge">{{ item.unit }}</span>
    </div>
    <div class="ingr-card-footer">
      <button class="ingr-btn ingr-edit" (click)="openIngredientForm('edit', item)">
        <i class="bi bi-pencil-fill"></i> Edit
      </button>
      <button class="ingr-btn ingr-delete" (click)="deleteIngredient(item._id)">
        <i class="bi bi-trash-fill"></i> Delete
      </button>
    </div>
  </div>

</div>

<!-- Pagination -->
<div class="d-flex justify-content-between align-items-center px-3 py-3 border-top"
  *ngIf="!isLoading && totalPages > 0">
  <small class="text-muted">
    Showing {{ getSerial(0) }}–{{ getSerial(ingredients.length - 1) }} of {{ total }} ingredients
  </small>
  <nav>
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" [class.disabled]="!hasPrevPage">
        <a class="page-link" (click)="goToPage(currentPage - 1)"><i class="bi bi-chevron-left"></i></a>
      </li>
      <li class="page-item" *ngFor="let p of pageNumbers" [class.active]="p === currentPage">
        <a class="page-link" (click)="goToPage(p)">{{ p }}</a>
      </li>
      <li class="page-item" [class.disabled]="!hasNextPage">
        <a class="page-link" (click)="goToPage(currentPage + 1)"><i class="bi bi-chevron-right"></i></a>
      </li>
    </ul>
  </nav>
</div>

        </div>
      </div>

    </div>
  </div>
</div>

<app-imgredient-form *ngIf="showForm" (close)="closeIngredientForm()">
</app-imgredient-form>
