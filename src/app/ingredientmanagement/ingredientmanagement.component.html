<div class="d-flex flex-column flex-md-row">
  <app-sidebar #sidebar></app-sidebar>

  <div class="main-content flex-grow-1" [class.sidebar-collapsed]="sidebar?.isCollapsed">
    <app-header></app-header>

    <div class="container-fluid mt-4">

      <!-- Top Bar -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 fw-semibold">Ingredient Management</h5>
        <button class="btn btn-primary" (click)="openIngredientForm('add')">
          <i class="bi bi-plus-lg"></i> Add Ingredient
        </button>
      </div>

      <!-- ✅ Search Bar -->
      <div class="mb-3">
        <div class="input-group w-100">
          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input type="text" class="form-control border-start-0 ps-0" placeholder="Search ingredient..."
            [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange($event)" />
          <!-- ✅ Clear button -->
          <button *ngIf="searchTerm" class="btn btn-outline-secondary" type="button"
            (click)="searchTerm = ''; onSearchChange('')">
            <i class="bi bi-x"></i>
          </button>
        </div>
      </div>

      <!-- Card -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">

          <!-- Loading State -->
          <div *ngIf="isLoading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Loading ingredients...</p>
          </div>

          <!-- Table -->
          <div class="table-responsive" *ngIf="!isLoading">
            <table class="table table-hover align-middle mb-0">

              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Unit</th>
                  <!-- <th>Ingredient ID</th> -->
                  <th class="text-end">Action</th>
                </tr>
              </thead>

              <tbody>

                <!-- Empty State -->
                <tr *ngIf="ingredients.length === 0">
                  <td colspan="5" class="text-center py-4 text-muted">
                    No ingredients found.
                  </td>
                </tr>

                <tr *ngFor="let item of ingredients; let i = index">
                  <td>{{ getSerial(i) }}</td>

                  <td class="fw-medium">{{ item.name }}</td>

                  <td>
                    <span class="badge bg-info">{{ item.unit }}</span>
                  </td>

                  <!-- <td>
                    <small class="text-muted font-monospace">{{ item._id }}</small>
                  </td> -->

                  <td class="text-end">
                    <button class="btn btn-sm btn-warning me-2" (click)="openIngredientForm('edit', item)">
                      <i class="bi bi-pencil"></i> Edit
                    </button>
                    <button class="btn btn-sm btn-danger" (click)="deleteIngredient(item._id)">
                      <i class="bi bi-trash"></i> Delete
                    </button>
                  </td>
                </tr>

              </tbody>
            </table>
          </div>

          <!-- Pagination Footer -->
          <div class="d-flex justify-content-between align-items-center px-3 py-3 border-top"
            *ngIf="!isLoading && totalPages > 0">

            <!-- Info -->
            <small class="text-muted">
              Showing {{ getSerial(0) }}–{{ getSerial(ingredients.length - 1) }} of {{ total }} ingredients
            </small>

            <!-- Page Buttons -->
            <nav>
              <ul class="pagination pagination-sm mb-0">

                <li class="page-item" [class.disabled]="!hasPrevPage">
                  <a class="page-link" (click)="goToPage(currentPage - 1)">
                    <i class="bi bi-chevron-left"></i>
                  </a>
                </li>

                <li class="page-item" *ngFor="let p of pageNumbers" [class.active]="p === currentPage">
                  <a class="page-link" (click)="goToPage(p)">{{ p }}</a>
                </li>

                <li class="page-item" [class.disabled]="!hasNextPage">
                  <a class="page-link" (click)="goToPage(currentPage + 1)">
                    <i class="bi bi-chevron-right"></i>
                  </a>
                </li>

              </ul>
            </nav>

          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<app-imgredient-form *ngIf="showForm" (close)="closeIngredientForm()">
</app-imgredient-form>
